<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>For the Record – Visit Our Website</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
      :root {
        --navy:      #0a1128;
        --cream:     #f8f6f1;
        --gold:      #c9a86a;
        --gold-line: rgba(201,168,106,0.35);
        --white:     #ffffff;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      @page { size: letter portrait; margin: 0; }

      body {
        font-family: "Inter", sans-serif;
        background: #e8e4dc;
        -webkit-font-smoothing: antialiased;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      @media screen {
        body { padding: 40px; display: flex; justify-content: center; }
      }
      @media print {
        body { background: none; padding: 0; display: block; }
        .page { margin: 0; }
      }

      /* ── Page ── */
      .page {
        width: 8.5in;
        height: 11in;
        background: var(--navy);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ── Decorative rings ── */
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid var(--gold-line);
        pointer-events: none;
      }
      .ring-1 { width: 680px; height: 680px; top: -220px; left: -220px; }
      .ring-2 { width: 440px; height: 440px; top: -90px;  left: -90px; opacity: .5; }
      .ring-3 { width: 620px; height: 620px; bottom: -200px; right: -200px; }
      .ring-4 { width: 380px; height: 380px; bottom: -80px;  right: -80px; opacity: .5; }

      /* ── Gold accent bars ── */
      .gold-bar-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
      }
      .gold-bar-bottom {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
      }

      /* ── Content ── */
      .content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 0.75in;
        gap: 0;
      }

      .logo {
        width: 130px;
        height: 130px;
        margin-bottom: 0.22in;
      }

      .eyebrow {
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3.5px;
        color: var(--gold);
        margin-bottom: 0.14in;
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 4.5rem;
        font-weight: 400;
        color: var(--white);
        line-height: 1.05;
        margin-bottom: 0.18in;
      }

      .subhead {
        font-family: "Inter", sans-serif;
        font-size: 1.1rem;
        font-weight: 400;
        color: rgba(255,255,255,0.72);
        line-height: 1.6;
        max-width: 4.8in;
        margin-bottom: 0.38in;
      }

      .divider {
        width: 3in;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin-bottom: 0.38in;
      }

      /* ── QR card ── */
      .qr-card {
        background: var(--white);
        border-radius: 24px;
        padding: 0.35in 0.4in;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2in;
        box-shadow: 0 24px 70px rgba(0,0,0,0.45);
        margin-bottom: 0.35in;
      }

      .qr-label {
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        color: var(--gold);
      }

      .qr-url {
        font-family: "Inter", sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--navy);
        letter-spacing: 0.3px;
      }

      /* ── Tagline ── */
      .tagline-block {
        display: flex;
        align-items: center;
        gap: 0.2in;
        margin-bottom: 0.38in;
      }
      .tagline-line {
        height: 1px;
        background: var(--gold-line);
        width: 0.9in;
      }
      .tagline {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.25rem;
        font-style: italic;
        color: rgba(255,255,255,0.65);
        white-space: nowrap;
      }

      /* ── Service pills ── */
      .services {
        display: flex;
        gap: 0.28in;
      }
      .service-pill {
        font-family: "Inter", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--gold);
        border: 1px solid var(--gold-line);
        border-radius: 50px;
        padding: 0.09in 0.24in;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="gold-bar-top"></div>
      <div class="gold-bar-bottom"></div>

      <div class="content">
        <img
          src="https://fortherecordmn.com/images/for-the-record-logo.svg"
          alt="For the Record Logo"
          class="logo"
        />

        <p class="eyebrow">Minnesota Wedding DJ &amp; Audio</p>

        <h1>Visit Our Website</h1>

        <p class="subhead">
          Explore our services, packages, and galleries —
          or request a song for the big day.
        </p>

        <div class="divider"></div>

        <div class="qr-card">
          <span class="qr-label">Scan with your camera</span>
          <div id="qr-website"></div>
          <span class="qr-url">fortherecordmn.com</span>
        </div>

        <div class="tagline-block">
          <div class="tagline-line"></div>
          <span class="tagline">Expert Audio. Unforgettable Entertainment. Stress-Free.</span>
          <div class="tagline-line"></div>
        </div>

        <div class="services">
          <span class="service-pill">Weddings</span>
          <span class="service-pill">Corporate Events</span>
          <span class="service-pill">Private Parties</span>
        </div>
      </div>
    </div>

    <script>
      new QRCode(document.getElementById("qr-website"), {
        text: "https://fortherecordmn.com",
        width: 300,
        height: 300,
        colorDark: "#0a1128",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H,
      });
    </script>
  </body>
</html>
