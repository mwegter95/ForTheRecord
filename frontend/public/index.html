<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>For The Record | Minnesota Wedding DJ & Audio Expert</title>
    <meta
      name="description"
      content="Minnesota's audio-obsessed wedding DJ. Expert sound, unforgettable entertainment, stress-free planning. BA in Music, 10+ years experience. Twin Cities & surrounding areas."
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://fortherecordmn.com/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta
      property="og:site_name"
      content="For the Record | Minnesota Wedding DJ"
    />
    <meta
      property="og:title"
      content="For The Record | Minnesota Wedding DJ & Audio Expert"
    />
    <meta
      property="og:description"
      content="Minnesota's audio-obsessed wedding DJ. Expert sound, unforgettable entertainment, stress-free planning. BA in Music, 10+ years experience. Twin Cities & surrounding areas."
    />
    <meta property="og:url" content="https://fortherecordmn.com/" />
    <meta
      property="og:image"
      content="https://fortherecordmn.com/images/hero-desktop.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="800" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="For The Record | Minnesota Wedding DJ & Audio Expert"
    />
    <meta
      name="twitter:description"
      content="Minnesota's audio-obsessed wedding DJ. Expert sound, unforgettable entertainment, stress-free planning."
    />
    <meta
      name="twitter:image"
      content="https://fortherecordmn.com/images/hero-desktop.webp"
    />

    <!-- Geo / Local SEO -->
    <meta name="geo.region" content="US-MN" />
    <meta name="geo.placename" content="Minneapolis, Minnesota" />

    <!-- JSON-LD Structured Data: LocalBusiness + DJService -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["LocalBusiness", "EntertainmentBusiness"],
        "name": "For the Record",
        "alternateName": "For the Record MN",
        "description": "Minnesota's audio-obsessed wedding DJ offering expert sound, unforgettable entertainment, and stress-free planning. BA in Music with 10+ years of experience serving the Twin Cities and surrounding areas.",
        "url": "https://fortherecordmn.com",
        "telephone": "+1-612-389-7005",
        "email": "michael@fortherecordmn.com",
        "image": "https://fortherecordmn.com/images/hero-desktop.webp",
        "logo": "https://fortherecordmn.com/images/favicon-512.png",
        "priceRange": "$$",
        "areaServed": [
          {
            "@type": "State",
            "name": "Minnesota"
          },
          {
            "@type": "City",
            "name": "Minneapolis"
          },
          {
            "@type": "City",
            "name": "St. Paul"
          },
          {
            "@type": "City",
            "name": "St. Cloud"
          }
        ],
        "serviceArea": {
          "@type": "GeoCircle",
          "geoMidpoint": {
            "@type": "GeoCoordinates",
            "latitude": 44.9778,
            "longitude": -93.265
          },
          "geoRadius": "150"
        },
        "knowsAbout": [
          "Wedding DJ",
          "Wedding Entertainment",
          "Ceremony Audio",
          "Reception Music",
          "Event Lighting",
          "MC Services",
          "Sound Engineering"
        ],
        "sameAs": [],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Minneapolis",
          "addressRegion": "MN",
          "addressCountry": "US"
        },
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Wedding DJ Services",
              "description": "Complete wedding DJ and MC services including ceremony audio, reception entertainment, custom playlist curation, and professional sound setup for Minnesota weddings."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Event Lighting",
              "description": "Dance floor lighting and ambient uplighting for wedding receptions and events."
            }
          }
        ]
      }
    </script>

    <!-- JSON-LD: FAQ Page (matches FAQ component content) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What areas does For the Record DJ serve?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We primarily serve the Twin Cities metro area (Minneapolis, St. Paul) and surrounding Minnesota regions including St. Cloud, Rochester, and Duluth. We also love traveling for destination weddings across the country."
            }
          },
          {
            "@type": "Question",
            "name": "How far in advance should I book my wedding DJ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ideally, booking 6-12 months in advance gives you the best availability. Popular dates—particularly Saturdays from June through October—fill quickly, so reach out as soon as your date is set."
            }
          },
          {
            "@type": "Question",
            "name": "What makes For the Record different from other Minnesota wedding DJs?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We're obsessed with audio quality and believe technique and knowledge matter far more than fancy gear. We bring a BA in Music and years of live event experience to every wedding, and we see ourselves as genuine partners in your day."
            }
          },
          {
            "@type": "Question",
            "name": "Do you handle ceremony audio for weddings?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes—ceremony audio is one of our specialties. We ensure everyone hears your vows and readings with perfect clarity using proper microphone technique, feedback elimination, and thorough pre-event testing."
            }
          },
          {
            "@type": "Question",
            "name": "What can be included in a wedding DJ package?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Options include ceremony audio, reception DJing (4-8+ hours), professional MCing, wireless microphones, custom playlist curation, dance floor lighting, uplighting, and more. Every package is custom-built for your vision and budget."
            }
          }
        ]
      }
    </script>

    <!-- Preload hero image FIRST for fast LCP -->
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/images/hero-mobile.webp"
      type="image/webp"
      media="(max-width: 768px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/images/hero-desktop.webp"
      type="image/webp"
      media="(min-width: 769px)"
      fetchpriority="high"
    />

    <!-- Preconnect to font origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicons -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="%PUBLIC_URL%/images/favicon.svg"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/images/favicon-32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/images/apple-touch-icon.png"
    />

    <!-- Google Fonts - Non-blocking load via media swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Lucide Icons - Deferred, loaded from jsDelivr (no redirect penalty) -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"
    ></script>

    <!--
      Analytics deferred until user interaction (scroll/mouse/touch).
      Removes ~470KB of JS from initial page load while still capturing
      all meaningful user sessions. May slightly undercount pure bounces.
    -->
    <script>
      (function () {
        var loaded = false;
        function loadAnalytics() {
          if (loaded) return;
          loaded = true;
          window.removeEventListener("scroll", loadAnalytics);
          window.removeEventListener("mousemove", loadAnalytics);
          window.removeEventListener("touchstart", loadAnalytics);

          // 1) Google Tag Manager
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({
            "gtm.start": new Date().getTime(),
            event: "gtm.js",
          });
          var gtmScript = document.createElement("script");
          gtmScript.async = true;
          gtmScript.src =
            "https://www.googletagmanager.com/gtm.js?id=GTM-5PFBHL7X";
          document.head.appendChild(gtmScript);

          // 2) Google Ads / gtag.js
          var gtagScript = document.createElement("script");
          gtagScript.async = true;
          gtagScript.src =
            "https://www.googletagmanager.com/gtag/js?id=AW-17945236375";
          gtagScript.onload = function () {
            function gtag() {
              window.dataLayer.push(arguments);
            }
            window.gtag = gtag;
            gtag("js", new Date());
            gtag("config", "AW-17945236375");
          };
          document.head.appendChild(gtagScript);
        }

        window.addEventListener("scroll", loadAnalytics);
        window.addEventListener("mousemove", loadAnalytics);
        window.addEventListener("touchstart", loadAnalytics);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
